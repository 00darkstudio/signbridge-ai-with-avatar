<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignBridge AI — Indian Sign Language Communication Platform</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F6F2; --surface:#FFFFFF; --surface-2:#EFEDE6; --surface-3:#E6E3D9;
    --text:#14181F; --text-muted:#5B6370;
    --teal:#0F766E; --teal-strong:#0B5C56; --teal-soft:#E4F3F1;
    --amber:#F5A524; --amber-soft:#FDF1DA;
    --violet:#7C4DFF; --violet-soft:#EFE9FF;
    --coral:#EF6461; --coral-soft:#FCE9E8;
    --border:#E2DFD6;
    --shadow: 0 1px 2px rgba(20,24,31,0.04), 0 8px 24px -12px rgba(20,24,31,0.12);
  }
  html.dark{
    --bg:#0A0F1A; --surface:#121A2B; --surface-2:#182136; --surface-3:#202B44;
    --text:#EDEFF4; --text-muted:#94A0B8;
    --teal:#2DD4BF; --teal-strong:#5EEAD4; --teal-soft:#0F2C2A;
    --amber:#FBBF24; --amber-soft:#2B2308;
    --violet:#A78BFA; --violet-soft:#211A3B;
    --coral:#F2857F; --coral-soft:#2B1717;
    --border:#233047;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 12px 30px -14px rgba(0,0,0,0.6);
  }
  *{ box-sizing:border-box; }
  body{ background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; transition:background .25s ease,color .25s ease; overflow:hidden; }
  .font-display{ font-family:'Fraunces',serif; }
  .font-mono{ font-family:'IBM Plex Mono',monospace; }
  .bg-surface{ background:var(--surface); }
  .bg-surface-2{ background:var(--surface-2); }
  .bg-surface-3{ background:var(--surface-3); }
  .text-muted{ color:var(--text-muted); }
  .border-token{ border-color:var(--border); }
  .shadow-token{ box-shadow:var(--shadow); }
  .text-teal{ color:var(--teal); } .bg-teal{ background:var(--teal); } .bg-teal-soft{ background:var(--teal-soft); }
  .text-amber{ color:var(--amber); } .bg-amber{ background:var(--amber); } .bg-amber-soft{ background:var(--amber-soft); }
  .text-violet{ color:var(--violet); } .bg-violet{ background:var(--violet); } .bg-violet-soft{ background:var(--violet-soft); }
  .text-coral{ color:var(--coral); } .bg-coral{ background:var(--coral); } .bg-coral-soft{ background:var(--coral-soft); }
  .btn-primary{ background:var(--teal); color:#F7FFFD; }
  .btn-primary:hover{ background:var(--teal-strong); }
  .btn-ghost{ background:transparent; border:1px solid var(--border); color:var(--text); }
  .btn-ghost:hover{ background:var(--surface-2); }
  .view{ display:none; }
  .view.active{ display:block; }
  .nav-item{ color:var(--text-muted); }
  .nav-item.active{ color:var(--teal); background:var(--teal-soft); }
  .nav-item:hover:not(.active){ background:var(--surface-2); }
  ::-webkit-scrollbar{ height:8px; width:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--border); border-radius:8px; }
  .focus-ring:focus-visible{ outline:3px solid var(--amber); outline-offset:2px; border-radius:6px; }
  a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{ outline:3px solid var(--amber); outline-offset:2px; }
  button:disabled{ opacity:.55; cursor:not-allowed; }

  @keyframes signPop{ 0%{ transform:translateY(10px) scale(.85); opacity:0; } 55%{ transform:translateY(-4px) scale(1.05); opacity:1; } 100%{ transform:translateY(0) scale(1); opacity:1; } }
  .sign-glyph{ animation: signPop .45s cubic-bezier(.2,.8,.2,1) both; }
  body.slow-signs .sign-glyph{ animation-duration:.9s; }
  @keyframes railGlow{ 0%,100%{ box-shadow:0 0 0 rgba(15,118,110,0); } 50%{ box-shadow:0 0 0 6px var(--teal-soft); } }
  .rail-active{ animation: railGlow 2.2s ease-in-out infinite; }
  @keyframes pulseDot{ 0%,100%{ opacity:.35; } 50%{ opacity:1; } }
  .pulse-dot{ animation: pulseDot 1.4s ease-in-out infinite; }
  @keyframes floaty{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-6px);} }
  .floaty{ animation: floaty 3.5s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce){
    .sign-glyph, .rail-active, .pulse-dot, .floaty{ animation:none !important; }
  }

  input[type=text], input[type=email], input[type=password], select, textarea{
    background:var(--surface); border:1px solid var(--border); color:var(--text);
  }
  .badge{ font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.04em; }
  .progress-track{ background:var(--surface-3); }
  .card{ background:var(--surface); border:1px solid var(--border); border-radius:8px; }
  .modal-backdrop{ background:rgba(10,14,22,0.55); }
  .meter{ background:var(--surface-3); height:8px; border-radius:999px; overflow:hidden; }
  .meter > span{ display:block; height:100%; background:var(--teal); border-radius:999px; transition:width .35s ease; }
  .seg-btn.active{ background:var(--teal-soft); color:var(--teal); border-color:var(--teal); }
  .landmark-dot{ position:absolute; width:8px; height:8px; border-radius:999px; background:var(--amber); box-shadow:0 0 0 4px rgba(245,165,36,.22); }
  .mono-box{ font-family:'IBM Plex Mono',monospace; font-size:12px; background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:10px; }
  .app-scroll{ height:calc(100vh - 65px); overflow-y:auto; }
  .lesson-stage{ min-height:clamp(280px, 42vh, 520px); }
  @media (max-width: 767px){
    body{ overflow:auto; }
    .app-scroll{ height:auto; overflow:visible; }
  }
</style>
</head>
<body class="min-h-screen">

<!-- ============ APP SHELL ============ -->
<div id="app" class="flex h-screen">

  <!-- Sidebar (desktop) -->
  <aside class="hidden md:flex flex-col w-60 shrink-0 border-r border-token bg-surface px-3 py-4 gap-4">
    <div class="flex items-center gap-3 px-2">
      <div class="w-10 h-10 rounded-xl bg-teal flex items-center justify-center shrink-0">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 15c3-6 6-9 8-9s5 3 8 9" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="4" cy="16" r="2" fill="#fff"/><circle cx="20" cy="16" r="2" fill="#fff"/></svg>
      </div>
      <div>
        <p class="font-display font-bold text-lg leading-none">SignBridge</p>

        <span class="text-xs text-muted">days</span>
      </div>
    </div>
  </aside>

  <!-- Main column -->

          <button id="theme-toggle" aria-label="Toggle dark mode" class="w-10 h-10 rounded-lg btn-ghost flex items-center justify-center focus-ring">
            <span id="theme-icon">🌙</span>
          </button>

            <span id="auth-label" class="text-sm font-medium">Sign in</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Views -->
    <main class="app-scroll flex-1 px-3 md:px-5 py-4 pb-24 md:pb-5 w-full">

      <!-- HOME / DASHBOARD -->
      <section id="view-home" class="view space-y-8"></section>

      <!-- TEXT TO ISL -->
      <section id="view-text2isl" class="view space-y-6"></section>

      <!-- VOICE TO ISL -->
      <section id="view-voice2isl" class="view space-y-6"></section>

      <!-- ISL TO TEXT/VOICE -->
      <section id="view-isl2text" class="view space-y-6"></section>

      <!-- LEARN -->
      <section id="view-learn" class="view space-y-6"></section>

      <!-- QUIZ -->
      <section id="view-quiz" class="view space-y-6"></section>

      <!-- PROFILE -->
      <section id="view-profile" class="view space-y-6"></section>

    </main>
  </div>
</div>

<!-- Mobile bottom nav -->
<nav id="mobile-nav" class="md:hidden fixed bottom-0 inset-x-0 z-30 bg-surface border-t border-token px-2 py-2 flex justify-between"></nav>

<!-- Auth modal -->
<div id="auth-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-backdrop px-4">
  <div class="card w-full max-w-sm p-6 relative">
    <button id="auth-close" aria-label="Close" class="absolute top-3 right-3 w-8 h-8 rounded-lg btn-ghost flex items-center justify-center focus-ring">✕</button>
    <p class="font-display font-bold text-2xl mb-1" id="auth-title">Sign in</p>
    <p class="text-sm text-muted mb-5">Track your lessons, quiz scores, and conversations across visits.</p>
    <form id="auth-form" class="space-y-3">
      <div id="auth-name-wrap" class="hidden">
        <label class="text-xs font-medium text-muted" for="auth-name">Full name</label>
        <input id="auth-name" type="text" class="w-full rounded-lg px-3 py-2 mt-1 text-sm focus-ring" placeholder="Ananya Rao">
      </div>
      <div>
        <label class="text-xs font-medium text-muted" for="auth-email">Email</label>
        <input id="auth-email" type="email" required class="w-full rounded-lg px-3 py-2 mt-1 text-sm focus-ring" placeholder="you@example.com">
      </div>
      <div>
        <label class="text-xs font-medium text-muted" for="auth-password">Password</label>
        <input id="auth-password" type="password" required minlength="4" class="w-full rounded-lg px-3 py-2 mt-1 text-sm focus-ring" placeholder="••••••••">
      </div>
      <button type="submit" class="w-full py-2.5 rounded-lg btn-primary font-semibold text-sm focus-ring">Continue</button>
    </form>
    <button id="auth-switch" class="text-xs text-teal font-medium mt-4 focus-ring">Don't have an account? Sign up</button>
    <p class="text-[11px] text-muted mt-4 leading-relaxed">Demo account — stored only for this prototype, no real credentials required.</p>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-20 md:bottom-6 left-1/2 -translate-x-1/2 z-50 hidden">
  <div class="card px-4 py-2.5 shadow-token text-sm font-medium" id="toast-text"></div>
</div>

/* ---------- Storage helpers (persistent artifact storage w/ graceful fallback) ---------- */
async function saveProgress(){
  try{
    if(window.storage) await window.storage.set('signbridge:progress', JSON.stringify(state.progress));
    else localStorage.setItem('signbridge:progress', JSON.stringify(state.progress));
  }catch(e){
    try{ localStorage.setItem('signbridge:progress', JSON.stringify(state.progress)); }catch(_){}
  }
}

/* ---------- Sign glyph generator ----------
   Procedurally generates a small abstract "hand shape" glyph per character.
   This stands in for a certified 3D-avatar / video sign library in the
   prototype: shape (finger count, spread, rotation) is deterministically
   derived from the character code so the same letter always renders the
   same glyph, giving a consistent visual "alphabet" for the demo. */
function glyphSVG(ch, opts={}){
  const size = opts.size || 64;
  const color = opts.color || 'var(--teal)';
  const c = (ch||' ').toUpperCase();
  const code = c.charCodeAt(0) || 32;
  if(c === ' '){
    return `<svg width="${size}" height="${size}" viewBox="0 0 64 64"><circle cx="32" cy="32" r="3" fill="var(--border)"/></svg>`;
  }
  const isDigit = /[0-9]/.test(c);
  const fingers = isDigit ? (Number(c)===0?5:Number(c)) : 3 + (code % 4);
  const rot = (code * 17) % 40 - 20;
  const spread = 26 + (code % 26);
  const palmR = size*0.20;
  const cx = size/2, cy = size/2 + size*0.10;
  let fingerEls = '';
  const n = Math.max(1, Math.min(5, fingers));
  for(let i=0;i<n;i++){
    const t = n===1 ? 0 : (i/(n-1) - 0.5);
    const angle = (-90 + rot + t*spread) * Math.PI/180;
    const len = size*0.34 + (((code*(i+3)) % 10) - 5)*0.02*size;
    const x2 = cx + Math.cos(angle)*len;
    const y2 = cy + Math.sin(angle)*len;
    fingerEls += `<line x1="${cx}" y1="${cy}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${color}" stroke-width="${size*0.075}" stroke-linecap="round"/>`;
  }
  const thumbAngle = (150 + (code%20)-10) * Math.PI/180;
  const tx = cx + Math.cos(thumbAngle)*size*0.24, ty = cy + Math.sin(thumbAngle)*size*0.24;
  fingerEls += `<line x1="${cx}" y1="${cy}" x2="${tx.toFixed(1)}" y2="${ty.toFixed(1)}" stroke="${color}" stroke-width="${size*0.08}" stroke-linecap="round"/>`;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" role="img" aria-label="sign for ${ch}">
    ${fingerEls}
    <circle cx="${cx}" cy="${cy}" r="${palmR}" fill="${color}" opacity="0.16"/>
    <circle cx="${cx}" cy="${cy}" r="${palmR*0.5}" fill="${color}"/>
  </svg>`;
}

function renderSignRail(text, containerEl, colorVar='var(--teal)'){
  containerEl.innerHTML = '';
  const chars = text.split('').slice(0, 60);
  if(!chars.length){
    containerEl.innerHTML = `<p class="text-sm text-muted italic px-2">Signs will appear here once you enter text.</p>`;
    return;
  }
  chars.forEach((ch, i)=>{
    const wrap = document.createElement('div');
    wrap.className = 'sign-glyph flex flex-col items-center gap-1 shrink-0';
    wrap.style.animationDelay = (i*0.05)+'s';
    wrap.innerHTML = `<div class="w-14 h-14 rounded-xl bg-surface-2 flex items-center justify-center">${glyphSVG(ch,{size:44,color:colorVar})}</div>
      <span class="text-[10px] font-mono text-muted">${ch===' '?'·':ch}</span>`;
    containerEl.appendChild(wrap);
  });
}

const Backend = {
  latency: 180,
  useRemote: location.protocol.startsWith('http'),
  async request(route, payload={}){
    if(this.useRemote){
      try{
        const res = await fetch(route, {
          method: route === '/api/health' ? 'GET' : 'POST',
          headers:{'Content-Type':'application/json'},
          body: route === '/api/health' ? undefined : JSON.stringify(payload)
        });
        if(res.ok) return await res.json();
      }catch(e){}
    }
    await sleep(this.latency);
    if(route === '/api/translate/text'){
      const text = payload.text || '';
      return { text, islOrder:normalizeToISL(text), confidence:confidenceFor(text), signs:normalizeToISL(text).split('/').map(s=>s.trim()).filter(Boolean) };
    }
    if(route === '/api/speech/recognise'){
      const text = payload.text || '';
      return { transcript:text, language:payload.lang || state.lang, confidence:confidenceFor(text), islOrder:normalizeToISL(text) };
    }
    if(route === '/api/gesture/recognise'){
      const sample = payload.sample || GESTURE_SAMPLES[Math.floor(Math.random()*GESTURE_SAMPLES.length)];
      return sample;
    }
    if(route === '/api/learn/lessons'){
      return LESSON_TRACKS.map(track=>({...track, lessons:track.lessons.map(lesson=>({...lesson, prompts:LESSON_PROMPTS[lesson.id]||[]}))}));
    }
    if(route === '/api/learn/attempt'){
      state.progress.lessonAttempts[payload.lessonId] = (state.progress.lessonAttempts[payload.lessonId]||0) + 1;
      await saveProgress();
      return { attempts:state.progress.lessonAttempts[payload.lessonId] };
    }
    if(route === '/api/progress/save'){
      await saveProgress();
      return { ok:true };
    }
    return { ok:true };
  }
};

function switchView(view){
  state.view = view;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  setActiveNav();
  window.scrollTo({top:0, behavior:'smooth'});
  const renderers = {
    home: renderHome, text2isl: renderText2ISL, voice2isl: renderVoice2ISL,
    isl2text: renderISL2Text, learn: renderLearn, quiz: renderQuiz, profile: renderProfile
  };
  renderers[view] && renderers[view]();
}

/* Renders the small chip row above the avatar showing every sign in the current sequence. */
function renderAvatarSequenceChips(signNames){
  const steps = document.getElementById('t2i-sequence-steps');
  if(!steps) return;
  steps.innerHTML = signNames.map((name,i)=>
    `<span class="text-xs px-3 py-1.5 rounded-full bg-surface-2 font-semibold${i===0?' bg-teal-soft':''}">${name.replace('_',' ')}</span>`
  ).join('');
}

async function runText2ISL(){
  const input = document.getElementById('t2i-input').value.trim();
  const lang = document.getElementById('t2i-lang').value;
  const status = document.getElementById('t2i-status');
  const rail = document.getElementById('t2i-rail');
  if(!input){ toast('Type something first'); return; }
  status.textContent = 'translating…';
  rail.classList.add('rail-active');
  await sleep(500);
  status.textContent = 'grammar pass…';
  const result = await Backend.request('/api/translate/text', {text:input, lang});
  const islOrder = result.islOrder;
  document.getElementById('t2i-grammar').textContent = islOrder;
  document.getElementById('t2i-confidence').textContent = result.confidence+'%';
  document.getElementById('t2i-count').textContent = result.signs.length+' units';
  await sleep(250);
  status.textContent = 'signing…';
  const clean = input.toUpperCase().replace(/[^A-Z0-9 ]/g,'');

  /* Drive the avatar off the same input. If a phrase in SignDB matches, play its
     keyframed sign sequence; otherwise fall back to the per-letter glyph rail only. */
  const matched = SignDB.findPhrase(input, { strict: true });
  if(matched && t2iAvatarPlayer){
    renderAvatarSequenceChips(matched.signs);
    t2iAvatarPlayer.loadSequence(matched.signs);
    t2iAvatarPlayer.play();
    renderSignRail('', rail);
    document.getElementById('t2i-avatar-meaning').textContent = `Matched phrase: "${matched.label}"`;
  } else {
    if(t2iAvatarPlayer) t2iAvatarPlayer.pause();
    renderAvatarSequenceChips([]);
    const signEl = document.getElementById('t2i-avatar-sign');
    const meaningEl = document.getElementById('t2i-avatar-meaning');
    if(signEl){
      signEl.textContent = '—';
      meaningEl.textContent = 'No avatar sign for this input yet — showing letter cues instead.';
    }
    renderSignRail(islOrder.replace(/\//g,' ') || clean || input, rail);
  }

  await sleep(500);
  rail.classList.remove('rail-active');
  status.textContent = 'done';
  document.getElementById('t2i-copy').disabled = false;
  document.getElementById('t2i-save').disabled = false;
  logConversation('text', input, lang);
  bumpXP(5);
}

function toggleMic(){
  const btn = document.getElementById('v2i-mic');
  const status = document.getElementById('v2i-status');
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    toast('Mic input unsupported here — try "Simulate speech" instead');
    return;
  }
  if(state.voice.listening){
    state.voice.recognition && state.voice.recognition.stop();
    return;
  }
  try{
    const rec = new SR();
    rec.lang = state.lang === 'en' ? 'en-IN' : state.lang;
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    rec.onstart = ()=>{ state.voice.listening = true; btn.classList.add('rail-active'); status.textContent = 'Listening…'; };
    rec.onerror = (e)=>{ status.textContent = 'Mic error — try "Simulate speech" instead.'; state.voice.listening = false; btn.classList.remove('rail-active'); };
    rec.onend = ()=>{ state.voice.listening = false; btn.classList.remove('rail-active'); };
    rec.onresult = (e)=>{
      const text = e.results[0][0].transcript;
      handleVoiceResult(text);
    };
    state.voice.recognition = rec;
    rec.start();
  }catch(err){
    toast('Mic unavailable in this environment — try "Simulate speech"');
  }
}

async function handleVoiceResult(text){

              <button aria-label="Favorite" class="w-8 h-8 rounded-lg btn-ghost focus-ring ${fav?'text-coral':''}" onclick="toggleFavorite('${l.id}')">${fav?'♥':'♡'}</button>
              <button class="px-3 py-1.5 rounded-lg ${done?'btn-ghost':'btn-primary'} text-xs font-semibold focus-ring" onclick="openLesson('${l.id}')">${done?'Review':'Start'}</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
  renderLearnStage(active, currentPrompt);
}

function renderLearnStage(lesson, prompt){
  const panel = document.getElementById('learn-stage-panel');
  const prompts = LESSON_PROMPTS[lesson.id] || [lesson.title];
  if(state.learn.stage === 'demo'){
    panel.innerHTML = `
      <div class="grid lg:grid-cols-[1fr_280px] gap-4">
        <div class="rounded-xl bg-surface-2 p-4 min-h-[190px] flex items-center gap-3 overflow-x-auto" id="learn-demo-rail"></div>
        <div class="space-y-3">
          <div class="mono-box"><span class="text-muted">Target</span><br>${escapeHtml(prompt)}</div>
          <div class="mono-box"><span class="text-muted">ISL order</span><br>${normalizeToISL(prompt)}</div>
          <button class="w-full py-2 rounded-lg btn-primary text-sm font-semibold focus-ring" onclick="setLearnStage('practice')">Practice this</button>
        </div>
      </div>`;
    renderSignRail(normalizeToISL(prompt).replace(/\//g,' '), document.getElementById('learn-demo-rail'));
    return;
  }
  if(state.learn.stage === 'practice'){
    panel.innerHTML = `
      <div class="grid lg:grid-cols-[1fr_320px] gap-4">
        <div class="rounded-xl bg-surface-2 p-5">
          <p class="text-sm text-muted mb-3">Type the phrase or letter shown by the sign sequence.</p>
          <div class="flex gap-3 overflow-x-auto pb-2 mb-4" id="learn-practice-rail"></div>
          <input id="learn-answer" type="text" class="w-full rounded-lg px-3 py-2 text-sm focus-ring" placeholder="Your answer">
          <div class="flex gap-2 mt-3">
            <button class="px-4 py-2 rounded-lg btn-primary text-sm font-semibold focus-ring" onclick="checkLessonAnswer()">Check answer</button>
            <button class="px-4 py-2 rounded-lg btn-ghost text-sm font-semibold focus-ring" onclick="nextLessonPrompt()">Next prompt</button>
          </div>
        </div>
        <div class="space-y-3">
          <div class="mono-box"><span class="text-muted">Prompt</span><br>${state.learn.promptIndex+1} / ${prompts.length}</div>
          <div class="mono-box"><span class="text-muted">Backend route</span><br>/api/learn/attempt</div>
          ${state.learn.feedback ? `<div class="p-3 rounded-lg ${state.learn.feedback.ok?'bg-teal-soft text-teal':'bg-coral-soft text-coral'} text-sm font-medium">${state.learn.feedback.text}</div>` : ''}
        </div>
      </div>`;
    renderSignRail(normalizeToISL(prompt).replace(/\//g,' '), document.getElementById('learn-practice-rail'));
    return;
  }
  panel.innerHTML = `
    <div class="grid lg:grid-cols-3 gap-4">
      ${prompts.map((item,i)=>`<div class="card p-4">
        <div class="flex justify-between items-center mb-2">
          <p class="font-medium text-sm">${escapeHtml(item)}</p>
          <span class="badge text-muted">${i+1}</span>
        </div>
        <div class="flex gap-1 overflow-x-auto">${normalizeToISL(item).replace(/\//g,' ').split('').slice(0,12).map(ch=>glyphSVG(ch,{size:30,color:'var(--teal)'})).join('')}</div>
      </div>`).join('')}
    </div>
    <button class="mt-4 px-5 py-2 rounded-lg btn-primary text-sm font-semibold focus-ring" onclick="completeLesson('${lesson.id}')">Mark lesson complete</button>`;
}

function openLesson(id){
  state.learn.activeLessonId = id;
  state.learn.stage = 'demo';
  state.learn.promptIndex = 0;
  state.learn.feedback = null;
  renderLearn();
}
function setLearnStage(stage){
  state.learn.stage = stage;
  state.learn.feedback = null;
  renderLearn();
}
function selectPracticePrompt(prompt){
  const id = state.learn.activeLessonId;
  LESSON_PROMPTS[id] = Array.from(new Set([prompt, ...(LESSON_PROMPTS[id]||[])]));
  state.learn.promptIndex = 0;
  state.learn.stage = 'demo';
  renderLearn();
}
function nextLessonPrompt(){
  const prompts = LESSON_PROMPTS[state.learn.activeLessonId] || [];
  state.learn.promptIndex = (state.learn.promptIndex + 1) % Math.max(1, prompts.length);
  state.learn.feedback = null;
  renderLearn();
}
async function checkLessonAnswer(){
  const prompts = LESSON_PROMPTS[state.learn.activeLessonId] || [];
  const expected = prompts[state.learn.promptIndex % prompts.length] || '';
  const answer = document.getElementById('learn-answer').value.trim();
  const ok = answer.toLowerCase() === expected.toLowerCase();
  await Backend.request('/api/learn/attempt', {lessonId:state.learn.activeLessonId, expected, answer, ok});
  state.learn.feedback = {ok, text: ok ? 'Correct. Move to the next prompt or finish the lesson.' : `Close. Expected: ${expected}`};
  if(ok) bumpXP(4);
  renderLearn();
}

async function completeLesson(id){
  const p = state.progress;
  const wasDone = p.lessonsDone.includes(id);
  if(!wasDone){
    p.lessonsDone.push(id);
    bumpXP(15);
    bumpStreak();
    toast('Lesson complete — great work!');
  }else{
    toast('Reviewing lesson');
  }
  await Backend.request('/api/progress/save');
  renderLearn();
  checkBadges();
}
async function toggleFavorite(id){
  const p = state.progress;
  const idx = p.favorites.indexOf(id);
  if(idx>-1) p.favorites.splice(idx,1); else p.favorites.push(id);
  await saveProgress();
  renderLearn();
}

/* ---- QUIZ ---- */
let quizState = null;
function renderQuiz(){
  const el = document.getElementById('view-quiz');
  el.innerHTML = `
    <div>
      <h1 class="font-display font-bold text-2xl md:text-3xl">${t('quiz')}</h1>
      <p class="text-muted mt-1">Practice with quick games and track your best scores.</p>
    </div>

    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
      ${quizModeCard('🤔','Guess the Sign','Identify the meaning of a shown sign')}
      ${quizModeCard('🧩','Match the Gesture','Pair gestures with their words')}
      ${quizModeCard('🗂️','Flash Cards','Flip through sign vocabulary')}
      ${quizModeCard('⏱️','Timed Challenge','Answer as many as you can in 60s')}
    </div>

    <div class="card p-6" id="quiz-panel"></div>

    <div class="card p-5">
      <p class="font-display font-semibold mb-3">Leaderboard (this device)</p>
      <div class="space-y-2" id="quiz-leaderboard"></div>
    </div>
  `;
  startQuiz();
  renderLeaderboard();
}
function quizModeCard(icon,title,desc){
  return `<button onclick="startQuiz()" class="card p-4 text-left focus-ring hover:-translate-y-0.5 transition-transform">
    <span class="text-xl">${icon}</span>
    <p class="font-medium text-sm mt-2">${title}</p>
    <p class="text-xs text-muted mt-1">${desc}</p>
  </button>`;
}

function startQuiz(){
  const questions = [...QUIZ_BANK].sort(()=>Math.random()-0.5).slice(0,5);
  quizState = { questions, idx:0, score:0 };
  renderQuizQuestion();
}
function renderQuizQuestion(){
  const panel = document.getElementById('quiz-panel');
  if(quizState.idx >= quizState.questions.length){
    const pct = Math.round((quizState.score/quizState.questions.length)*100);
    panel.innerHTML = `
      <div class="text-center py-6">
        <p class="text-4xl mb-2">${pct>=80?'🏆':pct>=50?'👍':'💪'}</p>
        <p class="font-display font-bold text-2xl">${pct}% score</p>
        <p class="text-muted text-sm mt-1">${quizState.score} of ${quizState.questions.length} correct</p>
        <button class="mt-5 px-5 py-2 rounded-lg btn-primary font-semibold text-sm focus-ring" onclick="startQuiz()">Try again</button>
      </div>`;
    recordQuizResult(pct);
    return;
  }
  const q = quizState.questions[quizState.idx];
  panel.innerHTML = `
    <div class="flex items-center justify-between mb-4">
      <span class="badge text-muted">Question ${quizState.idx+1} / ${quizState.questions.length}</span>
      <span class="badge text-amber bg-amber-soft px-2 py-0.5 rounded-full">+${state.progress.xp} XP</span>
    </div>
    <p class="font-medium mb-4">${q.q}</p>
    <div class="grid sm:grid-cols-2 gap-3">
      ${q.options.map((o,i)=>`<button class="card p-3 text-left text-sm focus-ring hover:border-teal" onclick="answerQuiz(${i})">${o}</button>`).join('')}
    </div>
  `;
}
function answerQuiz(i){
  const q = quizState.questions[quizState.idx];
  const correct = i === q.answer;
  if(correct){ quizState.score++; bumpXP(10); toast('Correct! 🎉'); } else { toast('Not quite — keep going'); }
  quizState.idx++;
  renderQuizQuestion();
}
async function recordQuizResult(pct){
  const p = state.progress;
  p.lastQuizScores.unshift({pct, time:new Date().toLocaleDateString()});
  p.lastQuizScores = p.lastQuizScores.slice(0,10);
  if(pct > p.quizHigh) p.quizHigh = pct;
  await saveProgress();
  renderLeaderboard();
  checkBadges();
}
function renderLeaderboard(){
  const el = document.getElementById('quiz-leaderboard');
  if(!el) return;
  const rows = [
    {name: state.user ? state.user.name : 'You', score: state.progress.quizHigh},
    {name:'Priya S.', score:88}, {name:'Arjun M.', score:76}, {name:'Fathima K.', score:71}
  ].sort((a,b)=>b.score-a.score);
  el.innerHTML = rows.map((r,i)=>`
    <div class="flex items-center gap-3 text-sm p-2 rounded-lg ${i===0?'bg-amber-soft':''}">
      <span class="w-6 text-center font-mono text-xs text-muted">#${i+1}</span>
      <span class="flex-1">${r.name}</span>
      <span class="font-mono font-semibold">${r.score}%</span>
    </div>`).join('');
}

  const earned = computeBadges();
  el.innerHTML = `
    <div class="flex items-center gap-4">
      <div class="w-16 h-16 rounded-full bg-violet-soft text-violet flex items-center justify-center font-display font-bold text-2xl">
        ${state.user ? state.user.name[0].toUpperCase() : '?'}
      </div>
      <div>
        <h1 class="font-display font-bold text-2xl">${state.user ? state.user.name : 'Guest'}</h1>
        <p class="text-muted text-sm">${state.user ? state.user.email : 'Sign in to save your progress across visits'}</p>
      </div>
    </div>

    ${!state.user ? `<div class="card p-4 flex items-center justify-between">
      <p class="text-sm">You're browsing as a guest — progress is kept only for this session.</p>

    <div class="card p-5">
      <p class="font-display font-semibold mb-3">Badges</p>
      <div class="grid grid-cols-2 sm:grid-cols-5 gap-3">
        ${BADGES.map(b=>{

          return `<div class="card p-3 text-center ${has?'':'opacity-40'}">
            <p class="text-2xl">${b.icon}</p>
            <p class="text-xs font-medium mt-1">${b.label}</p>
            <p class="text-[10px] text-muted mt-0.5">${b.desc}</p>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="grid md:grid-cols-2 gap-4">
      <div class="card p-5">
        <p class="font-display font-semibold mb-3">Favorite lessons</p>
        <div class="space-y-2">
          ${p.favorites.length ? p.favorites.map(id=>{
            const l = LESSON_TRACKS.flatMap(tr=>tr.lessons).find(x=>x.id===id);
            return l ? `<div class="text-sm flex items-center justify-between p-2 rounded-lg bg-surface-2"><span>${l.title}</span><span class="text-coral">♥</span></div>` : '';
          }).join('') : `<p class="text-sm text-muted italic">No favorites yet — heart a lesson in Learn ISL.</p>`}
        </div>
      </div>
      <div class="card p-5">
        <p class="font-display font-semibold mb-3">Conversation history</p>
        <div class="space-y-2 max-h-56 overflow-y-auto">
          ${p.convoHistory.length ? p.convoHistory.map(c=>`
            <div class="text-sm flex items-center gap-2 p-2 rounded-lg bg-surface-2">
              <span>${c.mode==='voice'?'🎙️':c.mode==='sign'?'🤟':'⌨️'}</span>
              <span class="flex-1 truncate">${escapeHtml(c.text)}</span>
              <span class="text-[10px] text-muted font-mono">${c.time}</span>
            </div>`).join('') : `<p class="text-sm text-muted italic">Nothing yet — start a conversion on any tool.</p>`}
        </div>
      </div>
    </div>

    <div class="grid md:grid-cols-2 gap-4">
      <div class="card p-5">
        <p class="font-display font-semibold mb-3">Saved phrases</p>
        <div class="flex flex-wrap gap-2">
          ${(p.savedPhrases||[]).length ? p.savedPhrases.map(phrase=>`
            <button class="text-xs px-3 py-1.5 rounded-full bg-surface-2 hover:bg-teal-soft hover:text-teal focus-ring" onclick="switchView('text2isl'); setTimeout(()=>{document.getElementById('t2i-input').value=${jsString(phrase)}; runText2ISL();}, 50)">${escapeHtml(phrase)}</button>
          `).join('') : `<p class="text-sm text-muted italic">Save useful phrases from Text → ISL.</p>`}
        </div>
      </div>
      <div class="card p-5">
        <p class="font-display font-semibold mb-3">Prototype settings</p>
        <div class="space-y-3 text-sm">
          <label class="flex items-center justify-between gap-3">
            <span>Auto-speak recognised ISL</span>
            <input type="checkbox" ${state.settings.autoSpeak?'checked':''} onchange="state.settings.autoSpeak=this.checked; saveSettings(); toast('Setting updated')">

          <label class="flex items-center justify-between gap-3">

            <button class="px-3 py-2 rounded-lg btn-ghost text-xs font-semibold focus-ring" onclick="exportProgress()">Export progress</button>

          </div>
        </div>
      </div>
    </div>

    ${state.user ? `<button class="text-sm text-coral font-medium focus-ring" onclick="signOut()">Sign out</button>` : ''}

function computeBadges(){
  const p = state.progress;
  const earned = [];
  if(p.lessonsDone.length>=1) earned.push('first_lesson');
  if(p.streak>=3) earned.push('streak3');
  if(p.quizHigh>=80) earned.push('quiz_ace');
  if(p.convoHistory.filter(c=>c.mode==='text').length>=5) earned.push('signer');
  if((p.langsUsed||[]).length>=3) earned.push('polyglot');
  return earned;
}
function checkBadges(){
  const before = state._badgeCount || 0;
  const now = computeBadges().length;
  if(now > before) toast('New badge unlocked! 🏅');
  state._badgeCount = now;
}

/* ---- shared helpers ---- */
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function fillSelect(id){
  const el = document.getElementById(id);
  el.innerHTML = LANGS.map(l=>`<option value="${l.code}">${l.label}</option>`).join('');
  el.value = state.lang;
}
async function bumpXP(n){
  state.progress.xp += n;
  state.progress.dailyXP = Math.min((state.progress.dailyGoal||30), (state.progress.dailyXP||0) + n);
  await saveProgress();
  const sc = document.getElementById('sidebar-streak-count');
  if(sc) sc.textContent = state.progress.streak;
}
async function bumpStreak(){
  state.progress.streak += 1;
  await saveProgress();
}
async function logConversation(mode, text, lang){
  const p = state.progress;
  p.convoHistory.unshift({mode, text, lang, version:APP_VERSION, time:new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})});
  p.convoHistory = p.convoHistory.slice(0,20);
  p.langsUsed = Array.from(new Set([...(p.langsUsed||[]), lang]));
  await saveProgress();
  checkBadges();
}
function progressPercent(value,total){ return Math.max(0, Math.min(100, Math.round((value/(total||1))*100))); }
function modeIcon(mode){ return mode==='voice'?'🎙️':mode==='sign'?'🤟':'⌨️'; }
function normalizeToISL(text){
  const words = text.trim().replace(/[^\p{L}\p{N}\s]/gu,'').split(/\s+/).filter(Boolean);
  const helper = new Set(['is','am','are','the','a','an','to','do','does']);
  const filtered = words.filter(w=>!helper.has(w.toLowerCase()));
  return filtered.length ? filtered.join(' / ').toUpperCase() : text.toUpperCase();
}
function confidenceFor(text){
  return Math.max(72, Math.min(98, 99 - Math.floor(text.length/4) + (text.split(/\s+/).length % 7)));
}
async function copyText(text){
  try{ await navigator.clipboard.writeText(text); toast('Copied'); }
  catch(e){ toast('Clipboard unavailable here'); }
}
function exportProgress(){
  const blob = new Blob([JSON.stringify({app:'SignBridge AI', version:APP_VERSION, exportedAt:new Date().toISOString(), user:state.user, progress:state.progress, settings:state.settings}, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'signbridge-progress.json'; a.click();
  URL.revokeObjectURL(url);
  toast('Progress export prepared');
}
async function resetProgress(){
  if(!confirm('Reset all local progress for this prototype?')) return;
  state.progress = { streak:0, xp:0, dailyGoal:30, dailyXP:0, lessonsDone:[], lessonAttempts:{}, quizHigh:0, favorites:[], lastQuizScores:[], convoHistory:[], savedPhrases:[], langsUsed:[] };
  await saveProgress();
  switchView(state.view);
  toast('Progress reset');
}
async function savePhrase(text){
  const clean = (text||'').trim();
  if(!clean){ toast('Nothing to save yet'); return; }
  state.progress.savedPhrases = Array.from(new Set([clean, ...(state.progress.savedPhrases||[])])).slice(0,12);
  await saveProgress();
  toast('Phrase saved');
}

/* ============================================================
   AUTH (mock)
============================================================ */
function openAuth(mode){
  state.authMode = mode;
  document.getElementById('auth-title').textContent = mode==='signin' ? 'Sign in' : 'Create your account';
  document.getElementById('auth-name-wrap').classList.toggle('hidden', mode==='signin');
  document.getElementById('auth-switch').textContent = mode==='signin' ? "Don't have an account? Sign up" : 'Already have an account? Sign in';
  document.getElementById('auth-modal').classList.remove('hidden');
  document.getElementById('auth-modal').classList.add('flex');
}
function closeAuth(){
  document.getElementById('auth-modal').classList.add('hidden');
  document.getElementById('auth-modal').classList.remove('flex');
}
document.getElementById('auth-close').onclick = closeAuth;
document.getElementById('auth-switch').onclick = ()=> openAuth(state.authMode==='signin' ? 'signup' : 'signin');
document.getElementById('auth-modal').addEventListener('click', e=>{ if(e.target.id==='auth-modal') closeAuth(); });

document.getElementById('auth-form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const email = document.getElementById('auth-email').value.trim();
  const name = document.getElementById('auth-name').value.trim();
  state.user = { name: state.authMode==='signup' ? (name||email.split('@')[0]) : (state.user?.name || email.split('@')[0]), email };
  await saveUser();
  closeAuth();
  updateAuthUI();
  toast(state.authMode==='signup' ? 'Account created — welcome!' : 'Signed in');
});

async function signOut(){
  state.user = null;
  await saveUser();
  updateAuthUI();
  renderProfile();
  toast('Signed out');
}
function updateAuthUI(){
  const label = document.getElementById('auth-label');
  const avatar = document.getElementById('auth-avatar');
  if(state.user){
    label.textContent = state.user.name.split(' ')[0];
    avatar.textContent = state.user.name[0].toUpperCase();
    document.getElementById('topbar-greeting').textContent = `${t('greet')}, ${state.user.name.split(' ')[0]}`;
  }else{
    label.textContent = 'Sign in';
    avatar.textContent = '?';
    document.getElementById('topbar-greeting').textContent = t('greet');
  }
}
document.getElementById('auth-btn').onclick = ()=> state.user ? switchView('profile') : openAuth('signin');

/* ============================================================
   THEME + LANGUAGE
============================================================ */
function applyTheme(){
  document.documentElement.classList.toggle('dark', state.theme==='dark');
  document.getElementById('theme-icon').textContent = state.theme==='dark' ? '☀️' : '🌙';
}
document.getElementById('theme-toggle').onclick = ()=>{
  state.theme = state.theme==='dark' ? 'light' : 'dark';
  applyTheme();
};

function buildLangSelect(){
  const sel = document.getElementById('lang-select');
  sel.innerHTML = LANGS.map(l=>`<option value="${l.code}">${l.label}</option>`).join('');
  sel.value = state.lang;
  sel.onchange = ()=>{
    state.lang = sel.value;
    buildNav();
    updateAuthUI();
    switchView(state.view);
  };
}

/* ============================================================
   INIT
============================================================ */
async function init(){
  await loadProgress();
  await loadUser();
  await loadSettings();
  applyTheme();
  document.body.classList.toggle('slow-signs', state.settings.slowSigns);
  buildLangSelect();
  buildNav();
  updateAuthUI();
  state._badgeCount = computeBadges().length;
  switchView('home');
}
init();
